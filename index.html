<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workman Adventure Compound</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#16341d;
    color:white;
    font-family:Arial,Helvetica,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.container{

    text-align:center;

}

.logo{

    width:180px;
    margin-bottom:35px;

}

h1{

    font-size:54px;
    margin-bottom:12px;
    letter-spacing:2px;

}

h2{

    font-weight:300;
    color:#d9d9d9;
    margin-bottom:50px;

}

.button{

    display:inline-block;

    background:#d4af37;

    color:#16341d;

    text-decoration:none;

    padding:18px 45px;

    border-radius:12px;

    font-size:22px;

    font-weight:bold;

    transition:.25s;

}

.button:hover{

    transform:scale(1.05);

}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="wac-icon.png">

<h1>WORKMAN</h1>

<h2>Adventure Awaits</h2>

<a class="button" href="#">ENTER</a>

</div>

</body>

</html>
