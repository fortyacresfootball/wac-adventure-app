<div id="drawerOverlay" class="drawer-overlay">

    <aside id="drawer" class="drawer">

        <button
            id="drawerClose"
            class="drawer-close">

            ✕

        </button>

        <!-- ====================================== -->
        <!-- Header -->
        <!-- ====================================== -->

        <div class="drawer-header">

            <img
                id="drawerBadge"
                class="drawer-badge"
                src="assets/icons/wac-icon.png"
                alt="Badge">

            <div>

                <span
                    id="drawerCategory"
                    class="drawer-category">

                    Category

                </span>

                <h2 id="drawerTitle">

                    Adventure Title

                </h2>

                <div
                    id="drawerPoints"
                    class="chip">

                    100 Points

                </div>

            </div>

        </div>

        <!-- ====================================== -->
<!-- Adventure Overview -->
<!-- ====================================== -->

<section class="drawer-section">

    <h3>Adventure Overview</h3>

    <p id="drawerVibe">

        Adventure overview goes here.

    </p>

</section>

        <!-- ====================================== -->
        <!-- Quick Information -->
        <!-- ====================================== -->

        <section class="drawer-section">

            <div class="stats-grid">

                <div class="stat-card">

                    <div
                        id="drawerDifficulty"
                        class="stat-number">

                        ★

                    </div>

                    <div class="stat-label">

                        Difficulty

                    </div>

                </div>

                <div class="stat-card">

                    <div
                        id="drawerTime"
                        class="stat-number">

                        --

                    </div>

                    <div class="stat-label">

                        Time

                    </div>

                </div>

                <div class="stat-card">

                    <div
                        id="drawerStatus"
                        class="stat-number">

                        Open

                    </div>

                    <div class="stat-label">

                        Status

                    </div>

                </div>

            </div>

        </section>

        <!-- Mission -->

        <section class="drawer-section">

            <h3>Mission</h3>

            <p id="drawerMission">

                Mission

            </p>

        </section>

        <!-- Requirements -->

        <section class="drawer-section">

            <h3>Requirements</h3>

            <p id="drawerRequirement">

                Requirements

            </p>

        </section>

        <!-- Why -->

        <section class="drawer-section">

            <h3>Why It Matters</h3>

            <p id="drawerWhy">

                Why

            </p>

        </section>

        <!-- President -->

        <section class="drawer-section">

            <h3>President's Note</h3>

            <p id="drawerNote">

                Note

            </p>

        </section>

        <!-- Location -->

        <section class="drawer-section">

            <h3>Location</h3>

            <p id="drawerLocation">

                Anywhere

            </p>

        </section>

        <!-- Footer -->

        <div class="drawer-footer">

            <button
                class="button"
                id="completeAdventure">

                Complete Adventure

            </button>

        </div>

    </aside>

</div>
